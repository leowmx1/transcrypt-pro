<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransCrypt Pro</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap Icons (CDN) -->
    <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <aside class="sidebar">
            <h2>🏡 首页</h2>
            <button class="sidebar-button active" data-category="home">
                <i class="bi bi-house-heart-fill" aria-hidden="true"></i>
                首页
            </button>
            <h2 style="margin-top: 20px;">📁 格式转换</h2>
            <button class="sidebar-button" data-category="conversion">
                <i class="bi bi-arrow-repeat" aria-hidden="true"></i>
                文件转换
            </button>
            <button class="sidebar-button" data-category="pro-conversion">
                <i class="bi bi-sliders2-vertical" aria-hidden="true"></i>
                专业转换
            </button>

            <h2 style="margin-top: 20px;">🔒 安全</h2>
            <button class="sidebar-button" data-category="encryption">
                <i class="bi bi-lock" aria-hidden="true"></i>
                文件加密
            </button>
            <button class="sidebar-button" data-category="decryption">
                <i class="bi bi-unlock" aria-hidden="true"></i>
                文件解密
            </button>
            <button class="sidebar-button" data-category="disguise">
                <i class="bi bi-file-earmark-lock2" aria-hidden="true"></i>
                文件伪装加密
            </button>
            <button class="sidebar-button" data-category="safebox">
                <i class="bi bi-hdd-fill" aria-hidden="true"></i>
                虚拟加密磁盘
            </button>
            <button class="sidebar-button" data-category="hash">
                <i class="bi bi-hash" aria-hidden="true"></i>
                文件哈希/校验
            </button>

            <div class="sidebar-footer">
                <button class="sidebar-button" id="settingsButton" data-category="settings">
                    <i class="bi bi-gear" aria-hidden="true"></i>
                    设置
                </button>
            </div>
        </aside>
        <main class="main-content"></main>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
